<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoriego - Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <h1 class="main-title">Autoriego - Monitor</h1>
        <div class="cards-grid">
            <div class="card card-dark">
                <div class="card-header"><span class="card-label">Humedad %</span></div>
                <div id="val-humedad" class="card-value">-</div>
                <div class="card-line"></div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-label">Temp °C.</span></div>
                <div id="val-temp" class="card-value">-</div>
                <div class="card-line card-line-thin"></div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-label">pH Suelo</span></div>
                <div id="val-ph-suelo" class="card-value">-</div>
                <div class="card-line card-line-thin"></div>
            </div>
            <div class="card">
                <div class="card-header"><span class="card-label">pH Agua</span></div>
                <div id="val-ph-agua" class="card-value">-</div>
                <div class="card-line card-line-thin"></div>
            </div>
        </div>

        <div class="controls-section">
            <div class="control-buttons">
                <button class="btn btn-primary" onclick="controlBomba(true)">Encender Pump</button>
                <button class="btn btn-secondary" onclick="controlBomba(false)">Apagar Pump</button>
            </div>
        </div>

        <div class="register-section">
            <h2 class="section-title">Registro reciente</h2>
            <div id="tabla-historial" class="register-table">
                <div class="register-row head-row">
                    <div class="cell">Fecha/Hora</div>
                    <div class="cell">Humedad</div>
                    <div class="cell">Bomba</div>
                </div>
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBA1tYFnGIBlBXeb4dnQX5YUM2RptVMKXs",
            authDomain: "autoriego-fe9de.firebaseapp.com",
            projectId: "autoriego-fe9de",
            databaseURL: "https://autoriego-fe9de-default-rtdb.firebaseio.com", // Verifica esta URL en tu consola
            storageBucket: "autoriego-fe9de.firebasestorage.app",
            messagingSenderId: "101375030283",
            appId: "1:101375030283:web:b8e536b795f3dcdcf4030e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LEER SENSORES EN TIEMPO REAL
        onValue(ref(db, 'sensores'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('val-humedad').innerText = (data.humedad || 0) + "%";
                document.getElementById('val-temp').innerText = (data.temperatura || 0) + "°C";
                document.getElementById('val-ph-suelo').innerText = data.ph_suelo || 0;
                document.getElementById('val-ph-agua').innerText = data.ph_agua || 0;
            }
        });

        // CONTROLAR BOMBA
        window.controlBomba = function(estado) {
            set(ref(db, 'control/bomba'), estado);
            
            // Opcional: Crear registro de historial al presionar
            const ahora = new Date().toLocaleString();
            push(ref(db, 'historial'), {
                fecha: ahora,
                bomba: estado ? "Encendida" : "Apagada"
            });
        };
    </script>
</body>
</html>
